  # Rest API
  ApiGatewayApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: REST-API
      Description: REST API

# DefinitionBody example (Using swagger)
# https://github.com/awslabs/aws-api-gateway-developer-portal/blob/main/cloudformation/template.yaml
