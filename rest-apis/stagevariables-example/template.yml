      #           type: aws_proxy




  # API Deployment
  ApiGatewayDeployment:
    DependsOn:
      - HelloFunctionMethod
    Type: AWS::ApiGateway::Deployment
    Properties:
      RestApiId: !Ref ApiGatewayApi


  # API Gateway Stage: dev
  DevStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: dev
      RestApiId: !Ref ApiGatewayApi
      DeploymentId: !GetAtt ApiGatewayDeployment.DeploymentId
      Variables:
        lambdaAlias: live  # Define the Lambda version or alias for dev
      MethodSettings:
        - DataTraceEnabled: true
          HttpMethod: "*"
          LoggingLevel: INFO
          ResourcePath: "/*"


  # ApiGatewayProxyResource:
  #   Type: AWS::ApiGateway::Resource
  #   Properties:
  #     RestApiId: !Ref ApiGatewayApi
  #     ParentId: !GetAtt ApiGatewayApi.RootResourceId
  #     PathPart: test # "{proxy+}"
  

  # MUST SET LAMBDA TO POST, GET request DOESNT WORK!!!
  # https://github.com/aws/serverless-application-model/issues/430
  # https://docs.aws.amazon.com/apigateway/latest/developerguide/set-up-lambda-integrations.html
  HelloFunctionMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGatewayApi
      ResourceId: !GetAtt ApiGatewayApi.RootResourceId
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Join
          - ''
          - - 'arn:aws:apigateway:'
            - !Ref 'AWS::Region'
            - ':lambda:path/2015-03-31/functions/'
            - !GetAtt HelloFunction.Arn
            - ':'
            - '$'
            - '{stageVariables.lambdaAlias}'
            - '/invocations'
  # !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${HelloFunction.Arn}/invocations

  # How you can invoke a lambda function version by using a stageVariable
  # arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${HelloFunction.Arn}:${stageVariables.lambdaAlias}/invocations

  HelloFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt HelloFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayApi}/*/*/*


  # Creates the initial Function version. A new version is not created unless you specify to publish a new version with the CLI.
  # A new version WILL NOT be made when you run `sam deploy` again.
  #
  # CI/CD setup:
  # LATEST_VERSION=$(aws lambda publish-version --function-name testingapi --query 'Version' --output text)
  # aws lambda update-alias --function-name <function-name> --name staging --function-version $LATEST_VERSION
  Version:
    Type: AWS::Lambda::Version
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties: 
      FunctionName: !Ref HelloFunction

  StagingAlias:
    Type: AWS::Lambda::Alias
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties: 
      FunctionName: !Ref HelloFunction
      FunctionVersion: !GetAtt Version.Version
      Name: staging

  StagingAliasPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref StagingAlias
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayApi}/*/*/*

  DevAlias:
    Type: AWS::Lambda::Alias
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties: 
      FunctionName: !Ref HelloFunction
      FunctionVersion: !GetAtt Version.Version
      Name: dev

  DevAliasPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref DevAlias
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayApi}/*/*/*

  HelloFunction:
    Type: AWS::Serverless::Function
    Properties:
      Role: !GetAtt LambdaRole.Arn
      FunctionName: testingapi
      Runtime: nodejs20.x
      Timeout: 30
      Handler: index.handler
      CodeUri: function/

      # Without linking this "Servlerless::Function" to the api, you will get an "internal server error"
      # Events:
      #   ProxyApiRoot:
      #     Type: Api
      #     Properties:
      #       RestApiId: !Ref ApiGatewayApi
      #       Path: /
      #       Method: POST
      # AutoPublishAlias: live  # Automatically publishes a new version with alias 'live'

  # LambdaAliasInvokePermission:
  #   Type: AWS::Lambda::Permission
  #   Properties: 
  #     FunctionName: !Ref HelloFunction.Alias  # References the live alias created by AutoPublishAlias
  #     Action: lambda:InvokeFunction
  #     Principal: apigateway.amazonaws.com  # Allow API Gateway to invoke the Lambda function
  #     SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayApi}/*/GET/

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Action:
              - sts:AssumeRole
            Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: LambdaLogPolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - apigateway:*
                Effect: Allow
                Resource: "*"



