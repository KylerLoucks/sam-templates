
AWSTemplateFormatVersion: 2010-09-09
Transform: AWS::Serverless-2016-10-31

Parameters:
  pAppName:
    Type: String
    Default: pr1
    Description: Application Name
  pVpcId:
    Type: AWS::EC2::VPC::Id
    Description: ID of the Virtual Private Network (VPC)
  pPrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description:
      List of Private SubnetIds in the Virtual Private Cloud (VPC).
  pACMCertificateArn:
    Type: String
    Description: ACM cert ARN for ECS services ALB
  pR53HostedZone:
    Type: String
    Description: Route 53 hosted zone
  # Container Ports
  pWebsitePort:
    Type: Number
    Default: 3000
  pApiServerPort:
    Type: Number
    Default: 8000
  pApiServerPort:
    Type: Number
    Default: 8000
  pTopHatPort:
    Type: Number
    Default: 4000
  pSocketioPort:
    Type: Number
    Default: 4000
  pMongoPort:
    Type: Number
    Default: 27017
  pRedisPort:
    Type: Number
    Default: 6379
  # pPublicSubnetIds:
  #   Type: List<AWS::EC2::Subnet::Id>
  #   Description:
  #     List of Public SubnetIds in the Virtual Private Cloud (VPC).


Resources:



  # ==============================================
  # ================= LOG GROUPS =================
  # ==============================================

  redisLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/redis/${pAppName}
      RetentionInDays: 7

  websiteLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/website/${pAppName}
      RetentionInDays: 7

  apiServerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/apiserver/${pAppName}
      RetentionInDays: 7

  topHatLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/tophat/${pAppName}
      RetentionInDays: 7

  socketioLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/socketio/${pAppName}
      RetentionInDays: 7

  mongoLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/mongo/${pAppName}
      RetentionInDays: 7


  # ===================================================
  # ================= SECURITY GROUPS =================
  # ===================================================
  
  # BACKEND SERVICES
  serviceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow all traffic from self and ALB Security Group
      VpcId: !Ref pVpcId

  # Allow everything that has this security group attached
  serviceSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !GetAtt serviceSecurityGroup.GroupId
      IpProtocol: -1
      FromPort: -1
      ToPort: -1
      SourceSecurityGroupId: !GetAtt serviceSecurityGroup.GroupId

  # ALLOW EVERYTHING FROM ALB SG
  serviceFrontendIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !GetAtt serviceSecurityGroup.GroupId
      IpProtocol: -1
      FromPort: -1
      ToPort: -1
      SourceSecurityGroupId: !Ref albSecurityGroup

  # FRONTEND SG
  albSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group for ALB allowing HTTP
      VpcId: !Ref pVpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: 443
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0



  # ECS task role
  taskRole:
    Type: AWS::IAM::Role
    Properties:
      Path: "/"
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument: 
            Version: 2012-10-17
            Statement:
              - Sid: AllowCreateLogGroup
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Sid: AllowLogStreams
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/*:*"
        - PolicyName: S3Access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject*
                  - s3:GetBucket*
                  - s3:List*
                  - s3:DeleteObject*
                  - s3:PutObject
                  - s3:PutObjectLegalHold
                  - s3:PutObjectRetention
                  - s3:PutObjectTagging
                  - s3:PutObjectVersionTagging
                  - s3:Abort*
                Resource: "*"
        
  taskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      Path: /
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      # Allows pulling ECR image and pushing logs to CW
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy


  # ====================================================
  # ================= TASK DEFINITIONS =================
  # ====================================================

  # WEBSITE
  websiteTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      ExecutionRoleArn: !GetAtt taskExecutionRole.Arn
      TaskRoleArn: !GetAtt taskRole.Arn
      Cpu: 4096
      Memory: 8192
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      # EphemeralStorage:
      #   SizeInGiB: 20
        
      ContainerDefinitions:
        - Name: website
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/website-${pAppName}:latest
          PortMappings:
              - ContainerPort: 3000
          Environment:
            # TODO: Will change this to be e.g. redis-pullrequest12345.dev.private-mr.com
            - Name: REDIS_HOST
              Value: !Sub redis-${pAppName}.dev.mdsnrdfd.com
            - Name: MONGO_HOST
              Value: !Sub mongo-${pAppName}.dev.mdsnrdfd.com
            - Name: MYSQL_HOST
              Value: !Sub mysql-${pAppName}.dev.mdsnrdfd.com
            - Name: MYSQL_USER
              Value: masteruser
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref websiteLogGroup
              awslogs-region: !Sub ${AWS::Region}
              awslogs-stream-prefix: ecs

  # API SERVER
  apiServerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      ExecutionRoleArn: !GetAtt taskExecutionRole.Arn
      TaskRoleArn: !GetAtt taskRole.Arn
      Cpu: 512
      Memory: 1024
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      # EphemeralStorage:
      #   SizeInGiB: 20
        
      ContainerDefinitions:
        - Name: apiserver
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/apiserver-${pAppName}:latest
          PortMappings:
              - ContainerPort: !Ref pApiServerPort
          Environment:
            # TODO: Will change this to be e.g. redis-pullrequest12345.dev.private-mr.com
            - Name: REDIS_HOST
              Value: !Sub redis-${pAppName}.dev.mdsnrdfd.com 
            - Name: NODE_ENV
              Value: ecs
            - Name: MONGO_HOST
              Value: !Sub mongo-${pAppName}.dev.mdsnrdfd.com
            - Name: MYSQL_HOST
              Value: !Sub mysql-${pAppName}.dev.mdsnrdfd.com
            - Name: MYSQL_USER
              Value: masteruser
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref apiServerLogGroup
              awslogs-region: !Sub ${AWS::Region}
              awslogs-stream-prefix: ecs

  # TOPHAT
  topHatTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      ExecutionRoleArn: !GetAtt taskExecutionRole.Arn
      TaskRoleArn: !GetAtt taskRole.Arn
      Cpu: 512
      Memory: 1024
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      # EphemeralStorage:
      #   SizeInGiB: 20
        
      ContainerDefinitions:
        - Name: tophat
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/tophat-${pAppName}:latest
          PortMappings:
              - ContainerPort: !Ref pTopHatPort
          Environment:
            # TODO: Will change this to be e.g. redis-pullrequest12345.dev.mdsnrdfd.com
            - Name: REDIS_HOST
              Value: !Sub redis-${pAppName}.dev.mdsnrdfd.com 
            - Name: NODE_ENV
              Value: ecs
            - Name: MONGO_HOST
              Value: !Sub mongo-${pAppName}.dev.mdsnrdfd.com
            - Name: MYSQL_HOST
              Value: !Sub mysql-${pAppName}.dev.mdsnrdfd.com
            - Name: MYSQL_USER
              Value: masteruser
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref topHatLogGroup
              awslogs-region: !Sub ${AWS::Region}
              awslogs-stream-prefix: ecs


