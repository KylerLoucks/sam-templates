  fargateCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${pAppName}-cluster
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT



  # =================================================
  # ================= TARGET GROUPS =================
  # =================================================

  # API SERVER
  apiServerTg:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties: 
      Name: !Sub apiserver-${pAppName}

      HealthCheckPath: /api/1.0/system/ping
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 120
      HealthCheckIntervalSeconds: 150
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      Port: !Ref pApiServerPort
      Protocol: HTTP
      ProtocolVersion: HTTP1
      Matcher:
        HttpCode: 200-499
      TargetType: ip
      VpcId: !Ref pVpcId

  # TOPHAT
  topHatTg:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties: 
      Name: !Sub tophat-${pAppName}

      HealthCheckPath: /awsHealthCheck.json
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 120
      HealthCheckIntervalSeconds: 150
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      Port: !Ref pTopHatPort
      Protocol: HTTP
      ProtocolVersion: HTTP1
      Matcher:
        HttpCode: 200-499
      TargetType: ip
      VpcId: !Ref pVpcId

  # WEBSITE
  websiteTg:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties: 
      Name: !Sub website-${pAppName}

      HealthCheckPath: /awsHealthCheck.json
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 120
      HealthCheckIntervalSeconds: 150
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      Port: !Ref pWebsitePort
      Protocol: HTTP
      ProtocolVersion: HTTP1
      Matcher:
        HttpCode: 200-499
      TargetType: ip
      VpcId: !Ref pVpcId

  # SOCKET IO
  socketioTg:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties: 
      Name: !Sub socketio-${pAppName}

      HealthCheckPath: /awsHealthCheck.json
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 120
      HealthCheckIntervalSeconds: 150
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      Port: !Ref pSocketioPort
      Protocol: HTTP
      ProtocolVersion: HTTP1
      Matcher:
        HttpCode: 200-499
      TargetType: ip
      VpcId: !Ref pVpcId

  # MONGO
  mongoTg:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties: 
      Name: !Sub mongo-${pAppName}

      HealthCheckPath: /
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 120
      HealthCheckIntervalSeconds: 150
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      Port: !Ref pMongoPort
      Protocol: HTTP
      ProtocolVersion: HTTP1
      Matcher:
        HttpCode: 200-499
      TargetType: ip
      VpcId: !Ref pVpcId

  # REDIS
  redisTg:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties: 
      Name: !Sub redis-${pAppName}

      HealthCheckPath: /
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 120
      HealthCheckIntervalSeconds: 150
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      Port: !Ref pRedisPort
      Protocol: HTTP
      ProtocolVersion: HTTP1
      Matcher:
        HttpCode: 200-499
      TargetType: ip
      VpcId: !Ref pVpcId


  # ===================================================
  # ================= LISTENERS/RULES =================
  # ===================================================
  
  # Listener to redirect HTTP traffic to HTTPS
  redirectListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties: 
      DefaultActions: 
        - Type: "redirect"
          RedirectConfig: 
            Port: "443"
            Protocol: "HTTPS"
            StatusCode: "HTTP_301"
      LoadBalancerArn: !Ref ecsLoadBalancer
      Port: 80
      Protocol: "HTTP"

  httpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties: 
      Certificates: 
        - CertificateArn: !Ref pACMCertificateArn
      DefaultActions: 
        - Type: "fixed-response"
          FixedResponseConfig:
            StatusCode: "503"
            ContentType: "text/plain"
            MessageBody: "You have reached an invalid domain."
      LoadBalancerArn: !Ref ecsLoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: "ELBSecurityPolicy-2016-08"

  # API SERVER
  apiServerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
        - Type: forward
          TargetGroupArn: !Ref apiServerTg
      Conditions:
        - Field: host-header
          HostHeaderConfig:
            Values: 
              - !Sub api-${pAppName}.dev.mdsnrdfd.com
      ListenerArn: !Ref httpsListener
      Priority: 7

  # SOCKET IO
  socketIORule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
        - Type: forward
          TargetGroupArn: !Ref socketioTg
      Conditions:
        - Field: host-header
          HostHeaderConfig:
            Values: 
              - !Sub tophat-${pAppName}.dev.mdsnrdfd.com
        - Field: path-pattern
          PathPatternConfig:
            Values: [/socket.io/*]
      ListenerArn: !Ref httpsListener
      Priority: 8

  # TOP HAT
  topHatRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
        - Type: forward
          TargetGroupArn: !Ref topHatTg
      Conditions:
        - Field: host-header
          HostHeaderConfig:
            Values: 
              - !Sub tophat-${pAppName}.dev.mdsnrdfd.com
      ListenerArn: !Ref httpsListener
      Priority: 12

  # WEBSITE
  websiteRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
        - Type: forward
          TargetGroupArn: !Ref websiteTg
      Conditions:
        - Field: host-header
          HostHeaderConfig:
            Values: 
              - !Sub ${pAppName}.dev.mdsnrdfd.com
      ListenerArn: !Ref httpsListener
      Priority: 18

  # REDIS
  redisRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
        - Type: forward
          TargetGroupArn: !Ref redisTg
      Conditions:
        - Field: host-header
          HostHeaderConfig:
            Values: 
              - !Sub redis-${pAppName}.dev.mdsnrdfd.com
      ListenerArn: !Ref httpsListener
      Priority: 20

  # MONGO}
  mongoRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
        - Type: forward
          TargetGroupArn: !Ref mongoTg
      Conditions:
        - Field: host-header
          HostHeaderConfig:
            Values: 
              - !Sub mongo-${pAppName}.dev.mdsnrdfd.com
      ListenerArn: !Ref httpsListener
      Priority: 22



  
  ecsLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      IpAddressType: ipv4
      Scheme: internet-facing
      SecurityGroups:
        - !GetAtt albSecurityGroup.GroupId
      Subnets: !Ref pPrivateSubnetIds
      Type: application

  ecsWebsiteService:
    DependsOn:
      - httpsListener
      - httpListener
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref fargateCluster
      DeploymentController: 
        Type: ECS
      DesiredCount: 1
      EnableECSManagedTags: true
      EnableExecuteCommand: true
      LaunchType: FARGATE
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      # Adjust if container takes a while to start up
      HealthCheckGracePeriodSeconds: 30
      LoadBalancers: 
        - ContainerName: website
          ContainerPort: !Ref pWebsitePort
          TargetGroupArn: !Ref websiteTg
      NetworkConfiguration: 
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !GetAtt serviceSecurityGroup.GroupId
          Subnets: !Ref pPrivateSubnetIds
      PlatformVersion: LATEST
      PropagateTags: SERVICE
      # ServiceConnectConfiguration: # Allows using Cloud Map to connect services between clusters
      #   ServiceConnectConfiguration
      ServiceName: !Sub website-${pAppName}
      # ServiceRegistries: 
      #   - ServiceRegistry
      TaskDefinition: !Ref websiteTaskDefinition
      Tags: 
        - Key: managed-by
          Value: SAM



  ecsApiServerService:
    DependsOn:
      - httpsListener
      - httpListener
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref fargateCluster
      DeploymentController: 
        Type: ECS
      DesiredCount: 1
      EnableECSManagedTags: true
      EnableExecuteCommand: true
      LaunchType: FARGATE
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      # Adjust if container takes a while to start up
      HealthCheckGracePeriodSeconds: 30
      LoadBalancers: 
        - ContainerName: apiserver
          ContainerPort: !Ref pApiServerPort
          TargetGroupArn: !Ref apiServerTg
      NetworkConfiguration: 
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !GetAtt serviceSecurityGroup.GroupId
          Subnets: !Ref pPrivateSubnetIds
      PlatformVersion: LATEST
      PropagateTags: SERVICE
      # ServiceConnectConfiguration: # Allows using Cloud Map to connect services between clusters
      #   ServiceConnectConfiguration
      ServiceName: !Sub apiserver-${pAppName}
      # ServiceRegistries: 
      #   - ServiceRegistry
      TaskDefinition: !Ref apiServerTaskDefinition
      Tags: 
        - Key: managed-by
          Value: SAM
  
  ecsTopHatService:
    DependsOn:
      - httpsListener
      - httpListener
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref fargateCluster
      DeploymentController: 
        Type: ECS
      DesiredCount: 1
      EnableECSManagedTags: true
      EnableExecuteCommand: true
      LaunchType: FARGATE
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      # Adjust if container takes a while to start up
      HealthCheckGracePeriodSeconds: 30
      LoadBalancers: 
        - ContainerName: tophat
          ContainerPort: !Ref pTopHatPort
          TargetGroupArn: !Ref topHatTg
      NetworkConfiguration: 
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !GetAtt serviceSecurityGroup.GroupId
          Subnets: !Ref pPrivateSubnetIds
      PlatformVersion: LATEST
      PropagateTags: SERVICE
      # ServiceConnectConfiguration: # Allows using Cloud Map to connect services between clusters
      #   ServiceConnectConfiguration
      ServiceName: !Sub tophat-${pAppName}
      # ServiceRegistries: 
      #   - ServiceRegistry
      TaskDefinition: !Ref topHatTaskDefinition
      Tags: 
        - Key: managed-by
          Value: SAM
  
  ecsSocketioService:
    DependsOn:
      - httpsListener
      - httpListener
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref fargateCluster
      DeploymentController: 
        Type: ECS
      DesiredCount: 1
      EnableECSManagedTags: true
      EnableExecuteCommand: true
      LaunchType: FARGATE
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      # Adjust if container takes a while to start up
      HealthCheckGracePeriodSeconds: 30
      LoadBalancers: 
        - ContainerName: socketio
          ContainerPort: !Ref pSocketioPort
          TargetGroupArn: !Ref socketioTg
      NetworkConfiguration: 
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !GetAtt serviceSecurityGroup.GroupId
          Subnets: !Ref pPrivateSubnetIds
      PlatformVersion: LATEST
      PropagateTags: SERVICE
      # ServiceConnectConfiguration: # Allows using Cloud Map to connect services between clusters
      #   ServiceConnectConfiguration
      ServiceName: !Sub socketio-${pAppName}
      # ServiceRegistries: 
      #   - ServiceRegistry
      TaskDefinition: !Ref socketioTaskDefinition
      Tags: 
        - Key: managed-by
          Value: SAM



  ecsMongoService:
    DependsOn:
      - httpsListener
      - httpListener
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref fargateCluster
      DeploymentController: 
        Type: ECS
      DesiredCount: 1
      EnableECSManagedTags: true
      EnableExecuteCommand: true
      LaunchType: FARGATE
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      # Adjust if container takes a while to start up
      HealthCheckGracePeriodSeconds: 30
      LoadBalancers: 
        - ContainerName: mongo
          ContainerPort: !Ref pMongoPort
          TargetGroupArn: !Ref mongoTg
      NetworkConfiguration: 
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !GetAtt serviceSecurityGroup.GroupId
          Subnets: !Ref pPrivateSubnetIds
      PlatformVersion: LATEST
      PropagateTags: SERVICE
      # ServiceConnectConfiguration: # Allows using Cloud Map to connect services between clusters
      #   ServiceConnectConfiguration
      ServiceName: !Sub mongo-${pAppName}
      # ServiceRegistries: 
      #   - ServiceRegistry
      TaskDefinition: !Ref mongoTaskDefinition
      Tags: 
        - Key: managed-by
          Value: SAM


  ecsRedisService:
    DependsOn:
      - httpsListener
      - httpListener
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref fargateCluster
      DeploymentController: 
        Type: ECS
      DesiredCount: 1
      EnableECSManagedTags: true
      EnableExecuteCommand: true
      LaunchType: FARGATE
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      # Adjust if container takes a while to start up
      HealthCheckGracePeriodSeconds: 30
      LoadBalancers: 
        - ContainerName: redis
          ContainerPort: !Ref pRedisPort
          TargetGroupArn: !Ref redisTg
      NetworkConfiguration: 
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !GetAtt serviceSecurityGroup.GroupId
          Subnets: !Ref pPrivateSubnetIds
      PlatformVersion: LATEST
      PropagateTags: SERVICE
      # ServiceConnectConfiguration: # Allows using Cloud Map to connect services between clusters
      #   ServiceConnectConfiguration
      ServiceName: !Sub redis-${pAppName}
      # ServiceRegistries: 
      #   - ServiceRegistry
      TaskDefinition: !Ref redisTaskDefinition
      Tags: 
        - Key: managed-by
          Value: SAM
  

  # ROUTE53 Records
  route53Records:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      HostedZoneId: !Ref pR53HostedZone # Id of the Hosted Zone created during domain registration
      RecordSets:
        # Website
        - Name: !Sub ${pAppname}.dev.mdsnrdfd.com
          Type: A
          AliasTarget:
            HostedZoneId: !GetAtt ecsLoadBalancer.CanonicalHostedZoneID # Loadbalancer Id
            DNSName: !GetAtt ecsLoadBalancer.DNSName
        
        # Tophat
        - Name: !Sub tophat-${pAppName}.dev.mdsnrdfd.com
          Type: A
          AliasTarget:
            HostedZoneId: !GetAtt ecsLoadBalancer.CanonicalHostedZoneID
            DNSName: !GetAtt ecsLoadBalancer.DNSName
        
        # Api Server
        - Name: !Sub api-${AppName}.dev.mdsnrdfd.com
          Type: A
          AliasTarget:
            HostedZoneId: !GetAtt ecsLoadBalancer.CanonicalHostedZoneID
            DNSName: !GetAtt ecsLoadBalancer.DNSName

        # mongo
        - Name: !Sub mongo-${AppName}.dev.mdsnrdfd.com
          Type: A
          AliasTarget:
            HostedZoneId: !GetAtt ecsLoadBalancer.CanonicalHostedZoneID
            DNSName: !GetAtt ecsLoadBalancer.DNSName

        # redis
        - Name: !Sub redis-${AppName}.dev.mdsnrdfd.com
          Type: A
          AliasTarget:
            HostedZoneId: !GetAtt ecsLoadBalancer.CanonicalHostedZoneID
            DNSName: !GetAtt ecsLoadBalancer.DNSName





Outputs:
  endpointUrl:
    Description: DNS Endpoint for the ECS ALB
    Value: !GetAtt ecsLoadBalancer.DNSName
