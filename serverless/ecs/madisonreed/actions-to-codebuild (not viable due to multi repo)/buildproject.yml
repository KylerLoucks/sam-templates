AWSTemplateFormatVersion: 2010-09-09
Description: > 
  CodeBuild with CodeStar Full Clone, Build ECR Images, and deploy with SAM CLI


Parameters:

  pAppName:
    Type: String
    Description: Used to name CI/CD resources.
    Default: ephemeral

  pCodestarConnectionArn:
    Type: String
    Description: ARN of the CodeStar Connection.
    Default: arn:aws:codestar-connections:us-east-1:313588322221:connection/e6cec00c-84fd-4370-b355-5291eaa602bc

  # CodeBuild

  pCodeBuildComputeType:
    Type: String
    Description: CodeBuild Compute Type
    Default: BUILD_GENERAL1_SMALL
    AllowedValues:
      - BUILD_GENERAL1_SMALL
      - BUILD_GENERAL1_MEDIUM
      - BUILD_GENERAL1_LARGE

  pCodeBuildImage:
    Type: String
    Description: Base image used by CodeBuild
    Default: aws/codebuild/amazonlinux2-x86_64-standard:3.0

  pBuildSpecPath:
    Type: String
    Description: Path and name for the Buildspec in repo
    Default: buildspec.yml



  # Tagging

  pEnvironmentTag:
    Type: String
    Description: Environment Tag for default resource tagging
    Default: development
    AllowedValues:
      - production
      - staging
      - sandbox
      - test
      - development
      - qa

Metadata:
  AWS::CloudFormation::Interface:
    ParameterLabels:
      pAppName:
        default: Application Name
      pCodestarConnectionArn:
        default: Codestar Connection Arn
      pCodeBuildComputeType:
        default: CodeBuild Compute Type
      pCodeBuildImage:
        default: CodeBuild Docker Image
      pBuildSpecPath:
        default: Buildspec file path
      pEnvironmentTag:
        default: Environment Tag  

    ParameterGroups:
      - Label:
          default: Settings
        Parameters:
          - pAppName
      - Label:
          default: CodeBuild Settings
        Parameters:
          - pCodeBuildComputeType
          - pCodeBuildImage
          - pBuildSpecPath
      - Label:
          default: Tagging
        Parameters:
          - pEnvironmentTag


Resources:

  # IAM Role - CodeBuild

  codeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${pAppName}-build-role
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - codebuild.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${pAppName}-build
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${pAppName}-build:*
        # - PolicyName: S3ArtifactBucket
        #   PolicyDocument:
        #     Version: 2012-10-17
        #     Statement:
        #       - Effect: Allow
        #         Action:
        #           - s3:GetObject
        #           - s3:GetObjectVersion
        #           - s3:PutObject
        #         Resource:
        #           - !Sub "arn:aws:s3:::${artifactBucket}"
        #           - !Sub "arn:aws:s3:::${artifactBucket}/*"
        - PolicyName: GitCloneConnection
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: 
                  - !Ref pCodestarConnectionArn
        - PolicyName: CreateWebhook
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - codebuild:*
                  - cloudformation:*
                Resource: 
                  - "*"

  codeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${pAppName}-build
      Artifacts:
        Type: NO_ARTIFACTS
      Description: CodeBuild Project
      Environment:
        ComputeType: !Ref pCodeBuildComputeType
        Image: !Ref pCodeBuildImage
        Type: LINUX_CONTAINER
        PrivilegedMode: true
        # EnvironmentVariables:
        #   - Name: PULL_REQUEST_ID
        #     Value: "#{variables.PR_ID}"
        #     Type: PLAINTEXT
        #   - Name: COMMIT_ID
        #     Value: "#{variables.COMMIT_ID}"
        #     Type: PLAINTEXT
        #   - Name: PR_EVENT
        #     Value: "#{variables.PR_EVENT}"
        #     Type: PLAINTEXT
        #   - Name: ACCOUNT_ID
        #     Value: !Ref "AWS::AccountId"
        #     Type: PLAINTEXT
          # - Name: CONTAINER_NAME
          #   Value: !Ref pContainerName
          #   Type: PLAINTEXT
          # - Name: BASE_IMAGE_REPO_NAME  
          #   Value: !Ref pBaseEcrRepo  
          #   Type: PLAINTEXT 
          # - Name: BASE_IMAGE_TAG 
          #   Value: !Ref pBaseImageTag 
          #   Type: PLAINTEXT
      ServiceRole: !GetAtt codeBuildServiceRole.Arn
      Source:
        Auth:
          Type: OAUTH
        Type: GITHUB
        Location: https://github.com/MadisonReed/mr.git
        GitCloneDepth: 0
        BuildSpec: !Ref pBuildSpecPath
      Triggers:
        Webhook: true
        FilterGroups:
          - - Type: EVENT
              Pattern: PULL_REQUEST_CREATED,PULL_REQUEST_UPDATED,PULL_REQUEST_MERGED,PULL_REQUEST_REOPENED
            - Type: BASE_REF
              Pattern: ^refs/heads/c303/ephemeral/main$
      TimeoutInMinutes: 60

  codeBuildLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/codebuild/${codeBuildProject}"
      RetentionInDays: 7