AWSTemplateFormatVersion: 2010-09-09
Transform: AWS::Serverless-2016-10-31
Description: > 
  Github V2 Source action, Build ECR Images, and deploy with SAM CLI


Parameters:

  pAppName:
    Type: String
    Description: Used to name CI/CD resources.
    Default: ephemeral

  # GitHub Repo

  pRepoOwner:
    Type: String
    Description: Owner not username. If the repo owner is an organization, enter organization name.
    Default: MadisonReed

  pRepoName:
    Type: String 
    Default: mr

  pCodestarConnectionArn:
    Type: String
    Description: ARN of the CodeStar Connection.
    Default: arn:aws:codestar-connections:us-east-1:313588322221:connection/e6cec00c-84fd-4370-b355-5291eaa602bc

  pTriggerBranch:
    Type: String
    Description: Branch to trigger CodePipeline off of.
    Default: master

  # CodeBuild

  pCodeBuildComputeType:
    Type: String
    Description: CodeBuild Compute Type
    Default: BUILD_GENERAL1_SMALL
    AllowedValues:
      - BUILD_GENERAL1_SMALL
      - BUILD_GENERAL1_MEDIUM
      - BUILD_GENERAL1_LARGE

  pCodeBuildImage:
    Type: String
    Description: Base image used by CodeBuild
    Default: aws/codebuild/amazonlinux2-x86_64-standard:4.0 # 4.0 for Node 16

  pWebsiteBuildSpecPath:
    Type: String
    Description: Path and name for the Buildspec in repo
    Default: buildspec.yml

  pTophatBuildSpecPath:
    Type: String
    Description: Path and name for the Buildspec in repo
    Default: buildspec.yml

  pApiServerBuildSpecPath:
    Type: String
    Description: Path and name for the Buildspec in repo
    Default: buildspec.yml

  pDeployBuildSpecPath:
    Type: String
    Description: Path and name for the Buildspec in repo
    Default: buildspec.yml



Metadata:
  AWS::CloudFormation::Interface:
    ParameterLabels:
      pAppName:
        default: Application Name
      pRepoOwner:
        default: GitHub Repository Owner
      pRepoName:
        default: GitHub Repository Name
      pCodestarConnectionArn:
        default: Codestar Connection Arn
      pTriggerBranch:
        default: GitHub Trigger Branch
      pCodeBuildComputeType:
        default: CodeBuild Compute Type
      pCodeBuildImage:
        default: CodeBuild Docker Image

    ParameterGroups:
      - Label:
          default: CodePipeline Settings
        Parameters:
          - pAppName
      - Label:
          default: CodePipeline Source Settings
        Parameters:
          - pRepoOwner
          - pRepoName
          - pCodestarConnectionArn
          - pTriggerBranch
      - Label:
          default: CodeBuild Settings
        Parameters:
          - pCodeBuildComputeType
          - pCodeBuildImage

Resources:


  ecrWebsiteRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub website-${pAppName}
      EmptyOnDelete: true

  ecrApiServerRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub apiserver-${pAppName}
      EmptyOnDelete: true

  ecrTophatRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub tophat-${pAppName}
      EmptyOnDelete: true

  # IAM Role - CodeBuild

  codeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${pAppName}-build-role
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - codebuild.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*
        - PolicyName: GitCloneConnection # Required for CODEBUILD_CLONE_REF
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: 
                  - !Ref pCodestarConnectionArn
        - PolicyName: S3ArtifactBucket
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                Resource:
                  - !Sub "arn:aws:s3:::${artifactBucket}"
                  - !Sub "arn:aws:s3:::${artifactBucket}/*"
        - PolicyName: ReadMrModules
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:Get*
                  - s3:List*
                Resource:
                  - arn:aws:s3:::mr-node-modules-dev
                  - arn:aws:s3:::mr-node-modules-dev/*
                  - arn:aws:s3:::mr-lambda-dev
                  - arn:aws:s3:::mr-lambda-dev/*
        - PolicyName: ECR
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - ecr:PutLifecyclePolicy
                  - ecr:PutImageTagMutability
                  - ecr:PutImageScanningConfiguration
                  - ecr:BatchGetImage
                  - ecr:CompleteLayerUpload
                  - ecr:DescribeImages
                  - ecr:TagResource
                  - ecr:ListTagsForResource
                  - ecr:UploadLayerPart
                  - ecr:InitiateLayerUpload
                  - ecr:BatchCheckLayerAvailability
                  - ecr:PutImage
                Resource:
                  - !GetAtt ecrWebsiteRepo.Arn
                  - !GetAtt ecrApiServerRepo.Arn
                  - !GetAtt ecrTophatRepo.Arn
        - PolicyName: BASE-ECR
          PolicyDocument: 
            Version: 2012-10-17 
            Statement:  
              - Effect: Allow 
                Action: 
                  - ecr:BatchGetImage 
                  - ecr:DescribeImages  
                  - ecr:ListTagsForResource 
                  - ecr:GetDownloadUrlForLayer
                Resource: 
                  - !Sub arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/base-image
        - PolicyName: ECR-Token
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
        - PolicyName: ParamStoreSSHKey
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameters
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/GITHUB/SSH_KEY"
        - PolicyName: SAMDeploy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - 
                Sid: AllowSAMBucketAccess
                Effect: Allow
                Action:
                  - s3:*
                Resource: 
                  - "arn:aws:s3:::aws-sam-cli-managed-default-*/*"
              - 
                Sid: IAMRoles
                Effect: Allow
                Action:
                  - iam:*
                Resource: arn:aws:iam::*:role/*
              - 
                Sid: Cloudformation
                Effect: Allow
                Action:
                  - cloudformation:*
                Resource: "*"
              -
                Sid: AllowResourceCreation
                Effect: Allow
                Action:
                  - route53:*
                  - ecs:*
                  - ec2:*
                  - elasticloadbalancing:*
                  - apigateway:*
                  - logs:*
                  - cloudwatch:*
                  - lambda:*
                  - events:*
                Resource: "*"

  codeBuildDeploy:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${pAppName}-deploy
      Artifacts:
        Type: CODEPIPELINE
      Description: CodeBuild Project
      Environment:
        ComputeType: !Ref pCodeBuildComputeType
        Image: !Ref pCodeBuildImage
        Type: LINUX_CONTAINER
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: PULL_REQUEST_ID
            Value: "#{variables.PR_ID}"
            Type: PLAINTEXT
          - Name: PR_EVENT
            Value: "#{variables.PR_EVENT}"
            Type: PLAINTEXT
          - Name: ACCOUNT_ID  
            Value: !Ref AWS::AccountId
            Type: PLAINTEXT

          - Name: APP_NAME 
            Value: !Ref pAppName 
            Type: PLAINTEXT

          - Name: SSH_KEY_FOR_SUBMODULE
            Value: /GITHUB/SSH_KEY
            Type: PARAMETER_STORE

          - Name: WEBSITE_REPOSITORY_URI
            Value: !GetAtt ecrWebsiteRepo.RepositoryUri
          - Name: TOPHAT_REPOSITORY_URI
            Value: !GetAtt ecrTophatRepo.RepositoryUri
          - Name: APISERVER_REPOSITORY_URI
            Value: !GetAtt ecrApiServerRepo.RepositoryUri

      ServiceRole: !GetAtt codeBuildServiceRole.Arn
      Source:
        Type: CODEPIPELINE
        BuildSpec: !Ref pDeployBuildSpecPath
      TimeoutInMinutes: 180

  codeBuildDeployLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/codebuild/${codeBuildDeploy}"
      RetentionInDays: 7

  codeBuildTophat:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${pAppName}-tophat
      Artifacts:
        Type: CODEPIPELINE
      Description: CodeBuild Project
      Environment:
        ComputeType: !Ref pCodeBuildComputeType
        Image: !Ref pCodeBuildImage
        Type: LINUX_CONTAINER
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: PULL_REQUEST_ID
            Value: "#{variables.PR_ID}"
            Type: PLAINTEXT
          - Name: PR_EVENT
            Value: "#{variables.PR_EVENT}"
            Type: PLAINTEXT
          - Name: ACCOUNT_ID  
            Value: !Ref AWS::AccountId
            Type: PLAINTEXT

          - Name: BASE_IMAGE_REPO_NAME  
            Value: base-image
            Type: PLAINTEXT

          - Name: BASE_IMAGE_TAG
            Value: latest
            Type: PLAINTEXT

          - Name: APP_NAME 
            Value: !Ref pAppName 
            Type: PLAINTEXT

          - Name: REPOSITORY_URI
            Value: !GetAtt ecrTophatRepo.RepositoryUri

      ServiceRole: !GetAtt codeBuildServiceRole.Arn
      Source:
        Type: CODEPIPELINE
        BuildSpec: !Ref pTophatBuildSpecPath
      TimeoutInMinutes: 60

  codeBuildTophatLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/codebuild/${codeBuildTophat}"
      RetentionInDays: 7

  codeBuildWebsite:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${pAppName}-website
      Artifacts:
        Type: CODEPIPELINE
      Description: CodeBuild Project
      Environment:
        ComputeType: !Ref pCodeBuildComputeType
        Image: !Ref pCodeBuildImage
        Type: LINUX_CONTAINER
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: PULL_REQUEST_ID
            Value: "#{variables.PR_ID}"
            Type: PLAINTEXT
          - Name: PR_EVENT
            Value: "#{variables.PR_EVENT}"
            Type: PLAINTEXT
          - Name: ACCOUNT_ID  
            Value: !Ref AWS::AccountId
            Type: PLAINTEXT

          - Name: BASE_IMAGE_REPO_NAME  
            Value: base-image
            Type: PLAINTEXT

          - Name: BASE_IMAGE_TAG
            Value: latest
            Type: PLAINTEXT 

          - Name: APP_NAME 
            Value: !Ref pAppName 
            Type: PLAINTEXT

          - Name: REPOSITORY_URI
            Value: !GetAtt ecrWebsiteRepo.RepositoryUri

      ServiceRole: !GetAtt codeBuildServiceRole.Arn
      Source:
        Type: CODEPIPELINE
        BuildSpec: !Ref pWebsiteBuildSpecPath
      TimeoutInMinutes: 60

  codeBuildWebsiteLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/codebuild/${codeBuildWebsite}"
      RetentionInDays: 7

  codeBuildApiServer:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${pAppName}-apiserver
      Artifacts:
        Type: CODEPIPELINE
      Description: CodeBuild Project
      Environment:
        ComputeType: !Ref pCodeBuildComputeType
        Image: !Ref pCodeBuildImage
        Type: LINUX_CONTAINER
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: PULL_REQUEST_ID
            Value: "#{variables.PR_ID}"
            Type: PLAINTEXT
          - Name: PR_EVENT
            Value: "#{variables.PR_EVENT}"
            Type: PLAINTEXT
          - Name: ACCOUNT_ID  
            Value: !Ref AWS::AccountId
            Type: PLAINTEXT

          - Name: BASE_IMAGE_REPO_NAME  
            Value: base-image
            Type: PLAINTEXT

          - Name: BASE_IMAGE_TAG
            Value: latest
            Type: PLAINTEXT 

          - Name: APP_NAME 
            Value: !Ref pAppName 
            Type: PLAINTEXT

          - Name: REPOSITORY_URI
            Value: !GetAtt ecrApiServerRepo.RepositoryUri

      ServiceRole: !GetAtt codeBuildServiceRole.Arn
      Source:
        Type: CODEPIPELINE
        BuildSpec: !Ref pApiServerBuildSpecPath
      TimeoutInMinutes: 60

  codeBuildApiServerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/codebuild/${codeBuildApiServer}"
      RetentionInDays: 7
      
      
  # IAM Role - CodePipeline    

  codePipelineServiceRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: !Sub ${pAppName}-pipeline-role
        AssumeRolePolicyDocument:
          Version: 2012-10-17
          Statement:
            - Effect: Allow
              Principal:
                Service:
                  - codepipeline.amazonaws.com
              Action:
                - sts:AssumeRole
        Policies:
          - PolicyName: s3Artifacts
            PolicyDocument:
              Version: 2012-10-17
              Statement:
                - Effect: Allow
                  Action:
                    - s3:PutObject
                    - s3:GetObject
                    - s3:GetObjectVersion
                  Resource: 
                    - !Sub "arn:aws:s3:::${artifactBucket}"
                    - !Sub "arn:aws:s3:::${artifactBucket}/*"
          - PolicyName: codeBuildTrigger
            PolicyDocument:
              Version: 2012-10-17
              Statement:
                - Effect: Allow
                  Action:
                    - codebuild:BatchGetBuilds
                    - codebuild:StartBuild
                    - codebuild:BatchGetBuildBatches
                    - codebuild:StartBuildBatch
                  Resource: 
                    - !GetAtt codeBuildWebsite.Arn
                    - !GetAtt codeBuildTophat.Arn
                    - !GetAtt codeBuildApiServer.Arn
                    - !GetAtt codeBuildDeploy.Arn
                - Effect: Allow
                  Action:
                    - codestar-connections:UseConnection
                  Resource: 
                    - !Ref pCodestarConnectionArn
          - PolicyName: ecsUpdate
            PolicyDocument:
              Version: 2012-10-17
              Statement:
                - Effect: Allow
                  Action:
                    - ecs:*
                    - ecr:*
                  Resource:
                    - "*"
          - PolicyName: iamPassRole
            PolicyDocument:
              Version: 2012-10-17
              Statement:
                - Effect: Allow
                  Action:
                    - iam:PassRole
                  Resource: 
                    - "*"
          

      
 # CodePipeline

  artifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${pAppName}-pipeline-artifacts-${AWS::AccountId}-${AWS::Region}
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # Artifact bucket cleanup
  DeleteObjectStorage:
    Type: Custom::S3DeleteObjectsLambda
    Properties:
      ServiceToken: !GetAtt DeleteS3ObjectsFunction.Arn
      Bucket: !Ref artifactBucket

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      Path: /
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          -
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        -
          PolicyName: S3Access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              -
                Sid: AllowLogging
                Effect: Allow
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource: "*"
              -
                Sid: DeleteBucketObjects
                Effect: Allow
                Action:
                  - "s3:ListBucket"
                  - "s3:ListBucketVersions"
                  - "s3:GetObject"
                  - "s3:DeleteObject"
                  - "s3:DeleteObjectVersion"
                Resource:
                  - !Sub "arn:aws:s3:::${artifactBucket}"
                  - !Sub "arn:aws:s3:::${artifactBucket}/*"

  DeleteS3ObjectsFunction:
    Type: AWS::Lambda::Function
    Properties:
      Description: Deletes objects from buckets provisioned by CloudFormation
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt LambdaRole.Arn
      Timeout: 120
      Code:
        ZipFile: |
          import os 
          import json
          import cfnresponse
          import boto3
          import logging

          from botocore.exceptions import ClientError

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          s3 = boto3.resource('s3')

          def handler(event, context):
            logger.info("Received event: %s" % json.dumps(event))
            bucket = s3.Bucket(event['ResourceProperties']['Bucket'])

            result = cfnresponse.SUCCESS

            try:
              if event['RequestType'] == 'Create' or event['RequestType'] == 'Update':
                result = cfnresponse.SUCCESS
              elif event['RequestType'] == 'Delete':
                result = delete_objects(bucket)
            except ClientError as e:
              logger.error('Error: %s', e)
              result = cfnresponse.FAILED

            cfnresponse.send(event, context, result, {})

          def delete_objects(bucket):        
            bucket.object_versions.delete()
            bucket.objects.all().delete()
            return cfnresponse.SUCCESS
            
  cleanupLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${DeleteS3ObjectsFunction}
      RetentionInDays: 7

  codePipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      ArtifactStore:
        Location: !Ref artifactBucket
        Type: S3
      Name: !Sub ${pAppName}-pipeline
      RoleArn: !GetAtt codePipelineServiceRole.Arn
      PipelineType: V2
      RestartExecutionOnUpdate: false
      Variables:
        - Name: PR_ID
          Description: Pull Request ID
        - Name: PR_EVENT
          Description: 'Type of PR event. Valid values: [opened, synchronize, reopened, closed]'
      Stages:
        - Name: Source
          Actions:
            - Name: Source
              Namespace: SourceVariables
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: 1
              Configuration:
                FullRepositoryId: !Sub ${pRepoOwner}/${pRepoName}
                ConnectionArn: !Ref pCodestarConnectionArn
                BranchName: !Ref pTriggerBranch
                DetectChanges: false
                OutputArtifactFormat: CODEBUILD_CLONE_REF # Code Build Git Full Clone
              OutputArtifacts:
                - Name: SourceArtifact
        - Name: Build
          Actions:
            - Name: ManualApproval
              ActionTypeId:
                Category: Approval
                Owner: AWS
                Provider: Manual
                Version: 1
              Configuration:
                CustomData: "Approve ephemeral deployment. Pull Request#: #{variables.PR_ID}"
                ExternalEntityLink: !Sub "https://github.com/${pRepoOwner}/${pRepoName}/commit/#{SourceVariables.CommitId}"
              RunOrder: 1

            - Name: BuildTophat
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              Configuration:
                ProjectName: !Ref codeBuildTophat
              InputArtifacts:
                - Name: SourceArtifact
              OutputArtifacts:
                - Name: BuildArtifactTophat
              RunOrder: 2

            - Name: BuildApiServer
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              Configuration:
                ProjectName: !Ref codeBuildApiServer
              InputArtifacts:
                - Name: SourceArtifact
              OutputArtifacts:
                - Name: BuildArtifactApiServer
              RunOrder: 2

            - Name: BuildWebsite
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              Configuration:
                ProjectName: !Ref codeBuildWebsite
              InputArtifacts:
                - Name: SourceArtifact
              OutputArtifacts:
                - Name: BuildArtifactWebsite
              RunOrder: 2

            - Name: DeployECS
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              Configuration:
                ProjectName: !Ref codeBuildDeploy
              InputArtifacts:
                - Name: SourceArtifact
              OutputArtifacts:
                - Name: BuildArtifact
              RunOrder: 3

Outputs:

  Version:
    Description: Template Version
    Value: ephemeral-pipeline-build-ecs-0.1
