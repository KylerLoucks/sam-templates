  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs16.x
      Handler: index.handler
      CodeUri: function/
      AutoPublishAlias: base
      Environment:
        Variables:
          MY_ENV: Hello World
      Events:
        Test:
          Type: Api
          Properties:
            Path: /rulesEngine
            Method: GET
            RestApiId: !Ref ColorAdvisorAPI

  ApiGatewayDomain:
    Type: AWS::ApiGateway::DomainName
    # TODO: Change the DomainName accordingly
    Properties:
      DomainName: !Sub ${pAppName}-coloradvisor.dev.mdsnrdfd.com 
      CertificateArn: !Ref pACMCertificateArn

  # Maps a deployed Stage to a domain
  ApiGatewayBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Properties:
      DomainName: !Ref ApiGatewayDomain
      RestApiId: !Ref ColorAdvisorAPI
      Stage: base
      BasePath: coloradvisor

  # ROUTE53 Records
  route53Records:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      HostedZoneId: !Ref pR53HostedZoneId # Id of the Hosted Zone created during domain registration
      RecordSets:
        # Website
        - Name: !Sub ${pAppName}-coloradvisor.dev.mdsnrdfd.com
          Type: A
          AliasTarget:
            HostedZoneId: Z2FDTNDATAQYW2 # Fixed AWS HostedZoneId for Edge Optimized APIs
            DNSName: !GetAtt ApiGatewayDomain.DistributionDomainName

Outputs:
  ColorAdvisorApiUrl:
    Description: DNS Endpoint for API GW
    Value: !Ref ApiGatewayDomain
