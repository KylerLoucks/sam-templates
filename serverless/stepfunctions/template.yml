
AWSTemplateFormatVersion: '2010-09-09'
Transform: 'AWS::Serverless-2016-10-31'

Parameters:
  pAlertsEmail:
    Type: String
    Default: kloucks@cloud303.io
    Description: Email to send error alerts to

Resources:
  startLambda:
    Type: AWS::Serverless::Function
    Properties:
      Role: !GetAtt lambdaRole.Arn
      Timeout: 120
      Environment:
        Variables:
          ALERTS_TOPIC_ARN: !GetAtt alertSns.TopicArn
      Runtime: python3.10
      Architectures:
        - x86_64
      Handler: app.lambda_handler
      CodeUri: startlambda/

  startLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${startLambda}
      RetentionInDays: 90


  notifyLambda:
    Type: AWS::Serverless::Function
    Properties:
      Role: !GetAtt lambdaRole.Arn
      Timeout: 120
      Environment:
        Variables:
          ALERTS_TOPIC_ARN: !GetAtt alertSns.TopicArn
      Runtime: python3.10
      Architectures:
        - x86_64
      Handler: app.lambda_handler
      CodeUri: notifierlambda/

  notifyLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${notifyLambda}
      RetentionInDays: 90

  stateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Definition:
        StartAt: RunLambdaFunction
        States:
          RunLambdaFunction:
            Type: Task
            Resource: !GetAtt startLambda.Arn
            Catch:
              - ErrorEquals: ["States.TaskFailed"]
                ResultPath: "$.error"
                Next: Notify
          Notify:
            Type: Task
            Resource: !GetAtt notifyLambda.Arn
            Parameters:
               Input.$: "$" # Pass entire input as a param
               TaskContext.$: "$$" # State machine metadata
            End: true
      Role: !GetAtt stateMachineExecutionRole.Arn
      Events:
        CronSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 8 ? * SAT *)  # Every Saturday @ 8 AM UTC. Unsure when data updates
            Enabled: False

  stateMachineExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StateMachineExecutionPolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: "*"

  # Lambda that prints an Error/Exception
  errorLambda:
    Type: AWS::Serverless::Function
    Properties:
      Role: !GetAtt lambdaRole.Arn
      Timeout: 120
      Environment:
        Variables:
          DATA_BUCKET: !Ref dataBucket
          DATASET_INFO_TABLE: !Ref datasetInfoTable
      Runtime: python3.10
      Architectures:
        - x86_64
      Handler: app.lambda_handler
      CodeUri: errorlambda/
  
  errorLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${errorLambda}
      RetentionInDays: 90




  alertSns:
    Type: AWS::SNS::Topic
    Properties: 
      Subscription:
        - Endpoint: !Ref pAlertsEmail
          Protocol: email

  alertSnsPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      PolicyDocument:
        Statement:
          - Sid: TrustAccountToPublishToTopic
            Effect: Allow
            Principal:
              AWS: "*"
            Action:
              - SNS:GetTopicAttributes
              - SNS:SetTopicAttributes
              - SNS:AddPermission
              - SNS:RemovePermission
              - SNS:DeleteTopic
              - SNS:Subscribe
              - SNS:ListSubscriptionsByTopic
              - SNS:Publish
              - SNS:Receive
            Resource: "*"
            Condition:
              StringEquals:
                AWS:SourceOwner: !Ref AWS::AccountId
      Topics:
        - Ref: alertSns
