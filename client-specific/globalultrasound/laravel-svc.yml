AWSTemplateFormatVersion: 2010-09-09

Description: >
  Deploys Laravel on ECS Fargate using an existing ECS Cluster and Service Discovery Namespace

Parameters:
  pVpcId:
    Type: AWS::EC2::VPC::Id
    Description: ID of the Virtual Private Network (VPC)
  pSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of Subnet IDs for the ECS tasks
  pMySQLDBStackName:
    Type: String
    Description: Name of the stack exporting the required values
  pClusterStackName:
    Type: String
    Description: Name of the cluster stack exporting the required values
  pAlbStackName:
    Type: String
    Description: The name of the ALB stack.
  DBUsername:
    Type: String
    Description: Username for the MySQL database
  pCPU:
    Type: Number
    Description: The number of CPUs for the instance or service.
    Default: 256
  pMemory:
    Type: Number
    Description: The number of CPUs for the instance or service.
    Default: 512
  pImageVersion:
    Type: String
    Description: The version tag of the container image.
    Default: latest
  pEcrRepo:
    Type: String
    Description: The ECR repository name.
    Default: gusi-laravel

  pMaxTasks:
    Type: Number
    Default: 10
    Description: Maximum number of tasks ECS can run

  pMinTasks:
    Type: Number
    Default: 1
    Description: Minimum number of tasks ECS can run

Resources:

  # Security Group
  serviceSecurityGroup:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupDescription: Allow all traffic from self and ALB Security Group
        VpcId: !Ref pVpcId

  # Allow everything that has this security group attached
  serviceSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !GetAtt serviceSecurityGroup.GroupId
      IpProtocol: -1
      FromPort: -1
      ToPort: -1
      SourceSecurityGroupId: !GetAtt serviceSecurityGroup.GroupId

  serviceVpcIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !GetAtt serviceSecurityGroup.GroupId
      IpProtocol: -1  # Allows all protocols
      FromPort: -1    # Allows all ports
      ToPort: -1      # Allows all ports
      CidrIp: 10.2.0.0/16

  # IAM Role for ECS Task Execution
  ecsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: LaravelECSExecutionRole
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/SecretsManagerReadWrite

  taskRole:
    Type: AWS::IAM::Role
    Properties:
      Path: "/"
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EcsExec
          PolicyDocument: 
            Version: 2012-10-17
            Statement:
              - Sid: AllowEcsExec
                Effect: Allow
                Action:
                  - ssmmessages:CreateControlChannel
                  - ssmmessages:CreateDataChannel
                  - ssmmessages:OpenControlChannel
                  - ssmmessages:OpenDataChannel
                Resource: "*"
        - PolicyName: CloudWatchLogs
          PolicyDocument: 
            Version: 2012-10-17
            Statement:
              - Sid: AllowCreateLogGroup
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Sid: AllowLogStreams
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/*:*"

  # ECS Task Definition for Laravel
  laravelTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: laravel-task
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      RuntimePlatform: 
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      Cpu: !Ref pCPU
      Memory: !Ref pMemory
      ExecutionRoleArn: !GetAtt ecsExecutionRole.Arn
      TaskRoleArn: !GetAtt  taskRole.Arn
      ContainerDefinitions:
        - Name: laravel-container
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${pEcrRepo}:${pImageVersion}
          Essential: true
          PortMappings:
            - ContainerPort: 80
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: laravel
          Environment:
            - Name: DB_CONNECTION
              Value: mysql
            - Name: DB_HOST
              Value: !ImportValue 
                Fn::Sub: ${pMySQLDBStackName}:RdsWriterAddress
            - Name: DB_PORT
              Value: 3306
            - Name: DB_DATABASE
              Value: gusi_api_mustafa_db
            - Name: DB_USERNAME
              Value: !Ref DBUsername
          Secrets:
            - Name: DB_PASSWORD
              ValueFrom: !Join 
                - ''
                - - !ImportValue 
                    Fn::Sub: ${pMySQLDBStackName}:RdsSecretArn
                  - ':password::'

  # CloudWatch Log Group for the container logs
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/laravel
      RetentionInDays: 7

  # ECS Service for Laravel
  laravelService:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !ImportValue 
        Fn::Sub: ${pClusterStackName}:FargateClusterArn
      ServiceName: laravel-service
      TaskDefinition: !Ref laravelTaskDefinition
      LoadBalancers:
        - ContainerName: laravel-container
          ContainerPort: 80
          TargetGroupArn: !Join 
            - ''
            - - !ImportValue 
                Fn::Sub: laravel-tg-${pAlbStackName}
      DesiredCount: 1
      EnableExecuteCommand: true
      EnableECSManagedTags: true
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Ref pSubnetIds
          SecurityGroups:
            - !GetAtt serviceSecurityGroup.GroupId
          AssignPublicIp: DISABLED
      ServiceRegistries:
        - RegistryArn: !ImportValue 
            Fn::Sub: ${pClusterStackName}:ServiceDiscoveryServiceArn

# IAM Role for Auto Scaling
  autoScalingRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AutoScalingRole
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: application-autoscaling.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceAutoscaleRole
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceRole
      Policies:
        - PolicyName: AutoScalingPolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - autoscaling:DescribeScalingActivities
                  - autoscaling:DescribeScalingGroups
                  - autoscaling:DescribeScalingPolicies
                  - autoscaling:DescribeScheduledActions
                  - autoscaling:PutScalingPolicy
                  - autoscaling:PutScheduledAction
                Resource: "*"
        - PolicyName: ELBAccessPolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - elasticloadbalancing:RegisterTargets
                  - elasticloadbalancing:DeregisterTargets
                  - elasticloadbalancing:DescribeTargetHealth
                Resource: "*"


  ecsServiceScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    DependsOn: ecsService
    Properties:
      MaxCapacity: !Ref pMaxTasks
      MinCapacity: !Ref pMinTasks
      ResourceId: !Sub "service/${pFargateClusterName}/laravel-service"
      RoleARN: !GetAtt autoScalingRole.Arn
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs


  ecsServiceScaleUpPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    DependsOn: ecsServiceScalingTarget
    Properties:
        PolicyName: scale-up
        PolicyType: StepScaling
        ScalingTargetId: !Ref ecsServiceScalingTarget
        StepScalingPolicyConfiguration:
            AdjustmentType: PercentChangeInCapacity
            Cooldown: 60
            MetricAggregationType: Average
            StepAdjustments:
              - MetricIntervalLowerBound: 0
                ScalingAdjustment: 100

  alarmEcsServiceScaleUp:
    Type: AWS::CloudWatch::Alarm
    DependsOn: ecsServiceScaleUpPolicy
    Properties:
        EvaluationPeriods: 1
        Statistic: Average
        Threshold: 80
        AlarmName: !Sub ${pServicePrefix}-service-high-cpu
        AlarmDescription: !Sub Alarm if laravel-service is running HIGH on CPU
        Period: 60
        AlarmActions:
          - !Ref ecsServiceScaleUpPolicy
        Namespace: AWS/ECS
        Dimensions:
          - Name: ClusterName
            Value: !Ref pFargateClusterName
          - Name: ServiceName
            Value: !Sub laravel-service
        ComparisonOperator: GreaterThanThreshold
        MetricName: CPUUtilization

  ecsServiceScaleDownPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    DependsOn: ecsServiceScalingTarget
    Properties:
        PolicyName: scale-down
        PolicyType: StepScaling
        ScalingTargetId: !Ref ecsServiceScalingTarget
        StepScalingPolicyConfiguration:
            AdjustmentType: PercentChangeInCapacity
            Cooldown: 300
            MetricAggregationType: Average
            StepAdjustments:
              - MetricIntervalUpperBound: 0
                ScalingAdjustment: -25

  alarmEcsServiceScaleDown:
    Type: AWS::CloudWatch::Alarm
    Properties:
        EvaluationPeriods: 1
        Statistic: Average
        Threshold: 60
        AlarmName: laravel-service-low-cpu
        AlarmDescription: Alarm if laravel-service is running LOW on CPU
        Period: 60
        OKActions:
          - !Ref ecsServiceScaleDownPolicy
        Namespace: AWS/ECS
        Dimensions:
          - Name: ClusterName
            Value: !ImportValue 
              Fn::Sub: ${pClusterStackName}:FargateClusterName
          - Name: ServiceName
            Value: laravel-service
        ComparisonOperator: GreaterThanThreshold
        MetricName: CPUUtilization

Outputs:
  EcsImageVersion:
    Description: ECS Image Version
    Value: !Ref pImageVersion
    Export:
      Name: !Sub ${AWS::StackName}:EcsImageVersion

  ECSServiceName:
    Description: Service Name
    Value: !Ref laravelService